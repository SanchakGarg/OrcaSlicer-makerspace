name: Makerspace Dev Release (manual)

# Manual re-publish of the makerspace-dev tag from the most recent build.
# Automatic dev releases happen inside build_all.yml after compilation.

on:
  workflow_dispatch:

jobs:
  dev-release:
    name: Publish dev build (manual)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version
        id: ver
        shell: bash
        run: |
          raw=$(grep 'set(SoftFever_VERSION' version.inc | cut -d '"' -f2)
          echo "raw=$raw"    >> "$GITHUB_OUTPUT"
          echo "ver=V${raw}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Resolve latest successful Build all run
        id: run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --workflow "Build all" \
            --branch main \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: OrcaSlicer_Windows_${{ steps.ver.outputs.ver }}
          run-id: ${{ steps.run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release/

      - name: Download Windows portable zip
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: OrcaSlicer_Windows_${{ steps.ver.outputs.ver }}_portable
          run-id: ${{ steps.run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release/

      - name: Download macOS universal DMG
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: OrcaSlicer_Mac_universal_${{ steps.ver.outputs.ver }}
          run-id: ${{ steps.run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: OrcaSlicer_Linux_ubuntu_2404_${{ steps.ver.outputs.ver }}
          run-id: ${{ steps.run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release/

      - name: Rename and publish
        shell: bash
        run: |
          cd release
          for f in OrcaSlicer_*; do [ -f "$f" ] && mv "$f" "Makerspace_${f}"; done
          ls -lh

      - name: Update makerspace-dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: makerspace-dev
          name: "Makerspace OrcaSlicer — dev build (tests may not have passed)"
          prerelease: true
          make_latest: false
          body: |
            **Manually re-published.** For automatic dev builds see commits to `main`.

            | Platform | File |
            |----------|------|
            | Windows  | `Makerspace_OrcaSlicer_Windows_*.exe` or `*_portable.zip` |
            | macOS    | `Makerspace_OrcaSlicer_Mac_universal_*.dmg` |
            | Linux    | `Makerspace_OrcaSlicer_Linux_ubuntu_2404_*.AppImage` |

            **Version:** ${{ steps.ver.outputs.raw }} · **Date:** ${{ steps.ver.outputs.date }}
          files: release/**/*
